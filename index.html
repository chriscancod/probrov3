<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOCTIS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* NAV */

nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 8%;
backdrop-filter:blur(8px);
background:rgba(0,0,0,0.4);
border-bottom:1px solid rgba(255,255,255,0.05);
z-index:999;
}

.logo{
letter-spacing:8px;
font-size:22px;
font-weight:600;
}

nav a{
margin-left:28px;
text-decoration:none;
color:white;
opacity:.7;
transition:.3s;
}

nav a:hover{
opacity:1;
}

/* HERO */

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
}

.hero h1{
font-size:110px;
letter-spacing:14px;
font-weight:600;
}

.hero p{
margin-top:12px;
opacity:.5;
font-size:18px;
}

/* CATEGORY */

.tabs{
display:flex;
justify-content:center;
gap:40px;
margin:80px 0 40px;
}

.tab{
cursor:pointer;
font-size:18px;
opacity:.5;
transition:.3s;
}

.tab:hover{
opacity:1;
}

.tab.active{
opacity:1;
border-bottom:2px solid white;
padding-bottom:4px;
}

/* PRODUCTS */

.products{
padding:0 8% 100px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:50px;
}

.product{
background:#111;
border-radius:14px;
overflow:hidden;
transition:.3s;
}

.product:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.product img{
width:100%;
height:340px;
object-fit:cover;
}

.product-info{
padding:18px;
}

.product h3{
font-weight:500;
}

.price{
opacity:.6;
margin-top:4px;
}

button{
margin-top:12px;
width:100%;
padding:12px;
border:none;
background:white;
color:black;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.85;
}

/* FOOTER */

footer{
padding:60px;
text-align:center;
opacity:.4;
border-top:1px solid #222;
}

</style>

</head>


<body>


<nav>

<div class="logo">NOCTIS</div>

<div>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

</nav>


<section class="hero">

<h1>NOCTIS</h1>
<p>Built for the night</p>

</section>


<div class="tabs">

<div class="tab active" onclick="filterCategory('shirts',this)">Shirts</div>

<div class="tab" onclick="filterCategory('pants',this)">Pants</div>

<div class="tab" onclick="filterCategory('accessories',this)">Accessories</div>

</div>


<section class="products" id="products"></section>


<footer>

© 2026 NOCTIS

</footer>



<script>

/* PRODUCTS */

const products=[

{
name:"Noctis Core Tee",
price:40,
category:"shirts",
image:"images/shirt1.jpg",
link:"https://square.link"
},

{
name:"Noctis Heavy Hoodie",
price:85,
category:"shirts",
image:"images/hoodie1.jpg",
link:"https://square.link"
},

{
name:"Noctis Cargo Pants",
price:95,
category:"pants",
image:"images/pants1.jpg",
link:"https://square.link"
},

{
name:"Noctis Beanie",
price:25,
category:"accessories",
image:"images/beanie.jpg",
link:"https://square.link"
}

]


const container=document.getElementById("products")


function renderProducts(category){

container.innerHTML=""

products.forEach(product=>{

if(product.category===category){

container.innerHTML+=`

<div class="product">

<img src="${product.image}">

<div class="product-info">

<h3>${product.name}</h3>

<div class="price">$${product.price}</div>

<a href="${product.link}" target="_blank">

<button>Buy Now</button>

</a>

</div>

</div>

`

}

})

}


function filterCategory(category,element){

document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"))

element.classList.add("active")

renderProducts(category)

}


renderProducts("shirts")

</script>


</body>
</html>
