<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOCTIS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
border-bottom:1px solid #222;
}

.logo{
font-size:28px;
letter-spacing:6px;
font-weight:600;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
opacity:.8;
}

/* HERO */

.hero{
height:40vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
letter-spacing:10px;
}

/* CATEGORY TABS */

.tabs{
display:flex;
justify-content:center;
gap:30px;
margin:40px 0;
}

.tab{
cursor:pointer;
opacity:.6;
font-size:18px;
}

.tab.active{
opacity:1;
border-bottom:2px solid white;
}

/* PRODUCTS */

.products{
padding:0 8% 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.product{
background:#111;
padding:15px;
border-radius:10px;
}

.product img{
width:100%;
border-radius:6px;
}

.product h3{
margin-top:10px;
}

.price{
opacity:.6;
margin-top:5px;
}

select{
margin-top:6px;
width:100%;
padding:6px;
background:#222;
border:none;
color:white;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
background:white;
color:black;
cursor:pointer;
font-weight:600;
}

/* CART */

.cart{
position:fixed;
top:20px;
right:20px;
background:black;
padding:12px 16px;
border-radius:8px;
border:1px solid #333;
cursor:pointer;
}

</style>

</head>


<body>


<div class="cart" onclick="openCart()">
Cart (<span id="cartCount">0</span>)
</div>


<nav>

<div class="logo">NOCTIS</div>

<div>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</div>

</nav>


<section class="hero">

<h1>NOCTIS</h1>
<p>Built for the night</p>

</section>


<div class="tabs">

<div class="tab active" onclick="filterCategory('shirts',this)">
Shirts
</div>

<div class="tab" onclick="filterCategory('pants',this)">
Pants
</div>

<div class="tab" onclick="filterCategory('accessories',this)">
Accessories
</div>

</div>


<section class="products" id="products"></section>


<script>

/* PRODUCT DATABASE */

const products = [

{
name:"Noctis all worth it Tee",
price:15,
category:"shirts",
image:"images/shirt1.jpg",
sizes:["S","M","L","XL"],
colors:["Black","Sand"]
},

{
name:"Noctis Heavy Hoodie",
price:85,
category:"shirts",
image:"images/hoodie1.jpg",
sizes:["S","M","L","XL"],
colors:["Black"]
},

{
name:"Noctis Cargo Pants",
price:95,
category:"pants",
image:"images/pants1.jpg",
sizes:["S","M","L","XL"],
colors:["Black","Grey"]
},

{
name:"Noctis Beanie",
price:25,
category:"accessories",
image:"images/beanie.jpg",
sizes:["One Size"],
colors:["Black"]
}

]

const container = document.getElementById("products")

function renderProducts(category){

container.innerHTML=""

products.forEach((product,i)=>{

if(product.category===category){

container.innerHTML += `

<div class="product">

<img src="${product.image}">

<h3>${product.name}</h3>

<div class="price">$${product.price}</div>

<select id="size${i}">
${product.sizes.map(s=>`<option>${s}</option>`).join("")}
</select>

<select id="color${i}">
${product.colors.map(c=>`<option>${c}</option>`).join("")}
</select>

<button onclick="addToCart(${i})">
Add to Cart
</button>

</div>

`

}

})

}

/* CATEGORY FILTER */

function filterCategory(category,element){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

element.classList.add("active")

renderProducts(category)

}

renderProducts("shirts")


/* CART */

let cart = JSON.parse(localStorage.getItem("cart")) || []

function addToCart(index){

const size=document.getElementById("size"+index).value
const color=document.getElementById("color"+index).value

cart.push({
name:products[index].name,
price:products[index].price,
size,
color
})

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

function updateCart(){

document.getElementById("cartCount").innerText = cart.length

}

updateCart()


function openCart(){

let total=0
let text="Cart\n\n"

cart.forEach(item=>{

text += `${item.name} (${item.size},${item.color}) - $${item.price}\n`

total+=item.price

})

text += `\nTotal: $${total}`

alert(text)

}

</script>

</body>
</html>
